{% extends "base.html" %}

{% block title %}Character Creation Wizard{% endblock %}

{% block content %}
<div class="container">
    <h1>Character Creation Wizard</h1>

    <div id="wizard-container">
        <!-- New Top Controls Area -->
        <div class="wizard-top-controls">
            <div class="left-buttons">
                <button id="prev-button" class="button" style="display: none;">Previous</button>
                <button id="cancel-button" class="button" onclick="window.location.href='{{ url_for('main.index') }}'">Cancel</button>
            </div>
            <div class="step-indicators">
                <span class="step-indicator" data-step="0">Intro</span>
                <span class="step-indicator" data-step="1">1</span>
                <span class="step-indicator" data-step="2">2</span>
                <span class="step-indicator" data-step="3">3</span>
                <span class="step-indicator" data-step="4">4</span>
                <span class="step-indicator" data-step="5">5</span>
                <span class="step-indicator" data-step="6">6</span>
                <span class="step-indicator" data-step="7">7</span>
                <span class="step-indicator" data-step="8">8</span>
                <span class="step-indicator" data-step="9">9</span>
            </div>
            <div class="right-button-container">
                <button id="next-button" class="button">Next</button>
            </div>
        </div>
        <!-- Redundant step-indicators div removed -->

        <!-- Step 0: Introduction Content Area (optional, can be empty if PHB description is enough) -->
        <div id="step-0" class="wizard-step" style="display: none;">
        </div>

        <div id="step-1" class="wizard-step" style="display: none;">
            <!-- Content for Step 1 will be loaded here dynamically -->
        </div>
        <div id="step-2" class="wizard-step" style="display: none;">
        </div>
        <div id="step-3" class="wizard-step" style="display: none;"></div>
        <div id="step-4" class="wizard-step" style="display: none;">
            <!-- Content for Step 4 will be loaded here dynamically by JavaScript -->
        </div>
        <div id="step-5" class="wizard-step" style="display: none;"></div>
        <div id="step-6" class="wizard-step" style="display: none;"></div>
        <div id="step-7" class="wizard-step" style="display: none;"></div>
        <div id="step-8" class="wizard-step" style="display: none;"></div>
        <div id="step-9" class="wizard-step" style="display: none;"></div>

        <div id="phb-description">
            <p>Description for the current step will go here.</p>
        </div>

        <!-- Original navigation-buttons div is now removed as its contents are reorganized into wizard-top-controls -->
        <!--
        <div class="navigation-buttons">
            <button id="prev-button" style="display: none;">Previous</button>
            <button id="next-button">Next</button>
            <button id="cancel-button" onclick="window.location.href='{{ url_for('main.index') }}'">Cancel</button>
        </div>
        -->
    </div>
</div>

<script src="{{ url_for('static', filename='js/general.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step0.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step1.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step2.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step3.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step4.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step5.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step6.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step7.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step8.js') }}"></script>
<script src="{{ url_for('static', filename='js/character_creation_step9.js') }}"></script>

<!-- Embedded styles removed, moved to static/css/style.css -->
{% endblock %}
